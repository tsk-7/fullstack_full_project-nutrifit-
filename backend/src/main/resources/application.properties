# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/nutrifit_db_fresh?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Application Configuration
server.port=8080
spring.application.name=nutrifit-backend
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS
server.servlet.context-path=/api

# JWT Configuration
app.jwt.secret=U3VwZXJTZWN1cmVKV1RTZWN1cmV0S2V5Zm9ySFM1MTJBbGdvcml0aG1NaW5pbXVtNjRDaGFyYWN0ZXJzTG9uZ0tleQ==
app.jwt.expiration-ms=604800000
app.jwt.refresh-expiration-ms=2592000000

# Logging
logging.level.root=INFO
logging.level.com.nutrifit=DEBUG
